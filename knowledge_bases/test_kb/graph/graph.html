<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LLM Wiki — Knowledge Graph</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  body { margin: 0; background: #1a1a2e; font-family: sans-serif; color: #eee; }
  #graph { width: 100vw; height: 100vh; }
  #controls {
    position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7);
    padding: 12px; border-radius: 8px; z-index: 10; max-width: 260px;
  }
  #controls h3 { margin: 0 0 8px; font-size: 14px; }
  #search { width: 100%; padding: 4px; margin-bottom: 8px; background: #333; color: #eee; border: 1px solid #555; border-radius: 4px; }
  #info {
    position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8);
    padding: 12px; border-radius: 8px; z-index: 10; max-width: 320px;
    display: none;
  }
  #stats { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; font-size: 12px; }
</style>
</head>
<body>
<div id="controls">
  <h3>LLM Wiki Graph</h3>
  <input id="search" type="text" placeholder="Search nodes..." oninput="searchNodes(this.value)">
  <div><span style="background:#4CAF50;padding:3px 8px;margin:2px;border-radius:3px;font-size:12px">source</span><span style="background:#2196F3;padding:3px 8px;margin:2px;border-radius:3px;font-size:12px">entity</span><span style="background:#FF9800;padding:3px 8px;margin:2px;border-radius:3px;font-size:12px">concept</span><span style="background:#9C27B0;padding:3px 8px;margin:2px;border-radius:3px;font-size:12px">synthesis</span></div>
  <div style="margin-top:8px;font-size:11px;color:#aaa">
    <span style="background:#555;padding:2px 6px;border-radius:3px;margin-right:4px">──</span> Explicit link<br>
    <span style="background:#FF5722;padding:2px 6px;border-radius:3px;margin-right:4px">──</span> Inferred
  </div>
</div>
<div id="graph"></div>
<div id="info">
  <b id="info-title"></b><br>
  <span id="info-type" style="font-size:12px;color:#aaa"></span><br>
  <span id="info-path" style="font-size:11px;color:#666"></span>
</div>
<div id="stats"></div>
<script>
const nodes = new vis.DataSet([
  {
    "id": "overview",
    "label": "overview",
    "type": "unknown",
    "color": "#9E9E9E",
    "path": "knowledge_bases/test_kb/wiki/overview.md",
    "group": -1
  },
  {
    "id": "sources/test-paper-2",
    "label": "Test Paper",
    "type": "source",
    "color": "#4CAF50",
    "path": "knowledge_bases/test_kb/wiki/sources/test-paper-2.md",
    "group": -1
  },
  {
    "id": "sources/new-test-doc",
    "label": "Research Notes",
    "type": "source",
    "color": "#4CAF50",
    "path": "knowledge_bases/test_kb/wiki/sources/new-test-doc.md",
    "group": -1
  },
  {
    "id": "sources/test-paper",
    "label": "Test Paper",
    "type": "source",
    "color": "#4CAF50",
    "path": "knowledge_bases/test_kb/wiki/sources/test-paper.md",
    "group": -1
  },
  {
    "id": "concepts/ResearchMethodology",
    "label": "ResearchMethodology",
    "type": "unknown",
    "color": "#9E9E9E",
    "path": "knowledge_bases/test_kb/wiki/concepts/ResearchMethodology.md",
    "group": -1
  }
]);
const edges = new vis.DataSet([
  {
    "from": "sources/test-paper-2",
    "to": "overview",
    "type": "EXTRACTED",
    "color": "#555555",
    "confidence": 1.0
  },
  {
    "from": "sources/new-test-doc",
    "to": "concepts/ResearchMethodology",
    "type": "EXTRACTED",
    "color": "#555555",
    "confidence": 1.0
  },
  {
    "from": "sources/new-test-doc",
    "to": "overview",
    "type": "EXTRACTED",
    "color": "#555555",
    "confidence": 1.0
  },
  {
    "from": "sources/test-paper",
    "to": "overview",
    "type": "EXTRACTED",
    "color": "#555555",
    "confidence": 1.0
  }
]);

const container = document.getElementById("graph");
const network = new vis.Network(container, { nodes, edges }, {
  nodes: {
    shape: "dot",
    size: 12,
    font: { color: "#eee", size: 13 },
    borderWidth: 2,
  },
  edges: {
    width: 1.2,
    smooth: { type: "continuous" },
    arrows: { to: { enabled: true, scaleFactor: 0.5 } },
  },
  physics: {
    stabilization: { iterations: 150 },
    barnesHut: { gravitationalConstant: -8000, springLength: 120 },
  },
  interaction: { hover: true, tooltipDelay: 200 },
});

network.on("click", params => {
  if (params.nodes.length > 0) {
    const node = nodes.get(params.nodes[0]);
    document.getElementById("info").style.display = "block";
    document.getElementById("info-title").textContent = node.label;
    document.getElementById("info-type").textContent = node.type;
    document.getElementById("info-path").textContent = node.path;
  } else {
    document.getElementById("info").style.display = "none";
  }
});

document.getElementById("stats").textContent =
  `${nodes.length} nodes · ${edges.length} edges`;

function searchNodes(q) {
  const lower = q.toLowerCase();
  nodes.forEach(n => {
    nodes.update({ id: n.id, opacity: (!q || n.label.toLowerCase().includes(lower)) ? 1 : 0.15 });
  });
}
</script>
</body>
</html>
